name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/runner/log430-lab1
          git pull

      - name: Restart containers
        run: |
          cd /home/runner/log430-lab1
          docker compose down
          docker compose up -d